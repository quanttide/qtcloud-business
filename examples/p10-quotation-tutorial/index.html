<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>报价知识考核 — 教程效果验证</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Noto Sans SC", sans-serif; background: #f5f5f5; padding: 40px; color: #333; }
.container { max-width: 780px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
h1 { font-size: 22px; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
.section { margin-bottom: 20px; padding: 16px; border-radius: 6px; background: #fafafa; }
.section h2 { font-size: 15px; margin-bottom: 8px; }
.section p { font-size: 14px; color: #555; margin-bottom: 12px; line-height: 1.6; }
.options { display: flex; flex-direction: column; gap: 6px; }
.options label { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all .15s; }
.options label:hover { border-color: #1a73e8; background: #f8faff; }
.options input[type="radio"] { width: 16px; height: 16px; }
.result { padding: 12px 16px; border-radius: 4px; font-size: 14px; margin-top: 12px; display: none; }
.result.correct { display: block; background: #e8f5e9; border-left: 3px solid #2e7d32; color: #2e7d32; }
.result.wrong { display: block; background: #fce4ec; border-left: 3px solid #c62828; color: #c62828; }
.result .hint { color: #555; margin-top: 4px; font-size: 13px; }
.btn { padding: 10px 24px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
.btn:hover { background: #1557b0; }
.btn:disabled { opacity: .4; cursor: default; }
.score-bar { height: 8px; background: #eee; border-radius: 4px; margin: 12px 0; overflow: hidden; }
.score-bar-fill { height: 100%; background: #1a73e8; border-radius: 4px; transition: width .4s; }
.stats { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 16px; }
#resultPanel { display: none; text-align: center; padding: 32px; }
#resultPanel .emoji { font-size: 48px; margin-bottom: 12px; }
#resultPanel h2 { font-size: 20px; margin-bottom: 8px; }
#resultPanel p { color: #555; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>报价知识考核</h1>
  <p class="subtitle">对照教程完成学习后自测。每道题模拟一个报价决策，验证你是否能独立走通全流程。</p>

  <div class="stats">
    <span id="progressText">第 1 / 8 题</span>
    <span id="scoreText">正确 0 / 0</span>
  </div>
  <div class="score-bar"><div class="score-bar-fill" id="progressBar" style="width:0%"></div></div>

  <div id="questionArea"></div>

  <div style="text-align:center; margin-top:16px;">
    <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
  </div>

  <div id="resultPanel">
    <div class="emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultDesc"></p>
    <button class="btn" onclick="resetQuiz()" style="margin-top:16px;">重新考核</button>
  </div>
</div>

<script>
const questions = [
  {
    scenario: '某企业联系我们做一期「管理者数据思维」内训，为期两天。你的第一步应该做什么？',
    choices: [
      '直接报一个市场均价',
      '收集项目基本信息，完成工作量、稀缺性、创新价值的评估并形成书面记录',
      '先问客户预算，再反推报价'
    ],
    correct: 1,
    correctMsg: '正确。章程第十五条规定：项目负责人应先完成工作量与稀缺性的基本评估，形成书面记录作为后续审批依据。',
    wrongMsg: '错误。章程明确规定不得未经评估直接报价，也不得仅按成本定价忽略稀缺性。应先完成四层价值评估（工作量、稀缺性、创新价值、长期价值）。',
    ref: '教程第一章 | 章程第十五条'
  },
  {
    scenario: '完成评估后，你确定这是一个「企业客户」，需要匹配「首席」顾问。基准价格是多少？',
    choices: [
      '500 元/小时',
      '1,000 元/小时',
      '2,000 元/小时'
    ],
    correct: 2,
    correctMsg: '正确。企业客户×首席 = 2,000 元/小时。',
    wrongMsg: '错误。企业客户×首席的基准价是 2,000 元/小时。500 元是学生客户×首席的实际执行价。',
    ref: '教程第二章 | 报价档案'
  },
  {
    scenario: '客户要求用他们的实际业务数据做案例设计，还希望输出一份管理者数据能力评估报告。这属于什么情况？',
    choices: [
      '标准服务，按基准价报价即可',
      '符合溢价条件（企业内训体系设计），可启动溢价',
      '应该直接拒绝，因为太复杂'
    ],
    correct: 1,
    correctMsg: '正确。用客户实际数据做案例 + 输出评估报告，属于企业内训体系设计，符合章程第十四条第二款的溢价条件。',
    wrongMsg: '错误。这涉及体系设计而非标准课程，符合溢价启动条件。溢价幅度 30%-50%，须管理层审批。',
    ref: '教程第三章 | 章程第十四条'
  },
  {
    scenario: '你判断需要溢价 40%，基准总价 88,000 元，溢价 35,200 元，合计 123,200 元。这属于哪类报价？审批人是谁？',
    choices: [
      '标准报价，业务线负责人审批',
      '重大报价（含溢价），公司管理层审批',
      '让利报价，公司管理层审批'
    ],
    correct: 1,
    correctMsg: '正确。涉及溢价的报价属于重大报价，须公司管理层审批。',
    wrongMsg: '错误。章程第十六条规定：涉及溢价报价的属于重大报价，须经公司管理层审批，不可由业务线负责人自行决定。',
    ref: '教程第四章 | 章程第十六条'
  },
  {
    scenario: '管理层审批通过了报价。客户表示预算有限，希望降价。你应该怎么做？',
    choices: [
      '马上降价，先拿下客户再说',
      '先确认客户是不理解价值还是预算不够。不理解价值则重塑认知；预算不够则看长期合作潜力',
      '直接告诉客户价格不能改'
    ],
    correct: 1,
    correctMsg: '正确。核心原则是先让对方理解价值再谈价格。降价唯一正当理由是长期合作价值。',
    wrongMsg: '错误。直接降价会损害专业度认知。应先确认客户是不理解价值还是预算不够。只有确认有长期合作潜力时，才是让利的时机。',
    ref: '教程第四章 | 章程第十七条'
  },
  {
    scenario: '这家客户是连锁企业，总部做完后区域分店大概率也会签。你决定让利，但首次合作不能低于什么线？',
    choices: [
      '不能低于成本价的一半',
      '不能低于保本线',
      '没有限制，可以亏本拿客户'
    ],
    correct: 1,
    correctMsg: '正确。章程第七条第一款规定：首次合作价格不低于保本线。让利是投资，不是单纯的价格损失。',
    wrongMsg: '错误。章程明确规定首次合作价格不低于保本线。让利的正当理由是长期合作价值——这次让利能换来持续合作的客户，才是投资。',
    ref: '教程第四章 | 章程第七条'
  },
  {
    scenario: '客户是高校，希望采购微专业课程包供全校学生使用。这属于哪类客户？',
    choices: [
      '企业客户',
      '学生客户',
      '高校客户'
    ],
    correct: 2,
    correctMsg: '正确。以学校/院系名义采购，由学校支付费用，属于高校客户。',
    wrongMsg: '错误。章程第十二条区分：以学校名义采购、学校支付费用的是高校客户。个人持学生证采购才是学生客户。两者价格体系不同。',
    ref: '教程第二章 | 章程第十二条'
  },
  {
    scenario: '项目结束后，评估记录、审批记录、谈判记录应该怎么处理？',
    choices: [
      '项目完成就删掉，免得占用空间',
      '全部归档。下次报价需要这次的经验来判断哪些对了哪些错了',
      '只保留最终报价单，其他不重要'
    ],
    correct: 1,
    correctMsg: '正确。归档不是因为流程要求，而是下一次报价需要上一次的经验。定价能力就是这样成长的。',
    wrongMsg: '错误。归档的核心价值在于积累定价经验——哪些判断对了、哪些低估了、哪些高估了，这些才是定价能力成长的养分。',
    ref: '教程第五章'
  }
];

let current = 0;
let answers = [];
const total = questions.length;

function render() {
  const q = questions[current];
  const area = document.getElementById('questionArea');

  let checked = answers[current];
  let selectedIdx = checked !== undefined ? checked : -1;

  area.innerHTML = `
    <div class="section">
      <h2>场景 ${current + 1}</h2>
      <p>${q.scenario}</p>
      <div class="options">
        ${q.choices.map((c, i) => `
          <label style="${selectedIdx === i ? 'border-color:#1a73e8;background:#f0f6ff;' : ''}">
            <input type="radio" name="q" value="${i}" ${selectedIdx === i ? 'checked' : ''} onchange="selectAnswer(${i})">
            ${c}
          </label>
        `).join('')}
      </div>
      <div class="result ${selectedIdx !== -1 ? (selectedIdx === q.correct ? 'correct' : 'wrong') : ''}" id="resultMsg" style="${selectedIdx !== -1 ? 'display:block' : ''}">
        ${selectedIdx === q.correct ? q.correctMsg : (selectedIdx !== -1 ? q.wrongMsg : '')}
        ${selectedIdx !== -1 ? `<div class="hint">📖 ${q.ref}</div>` : ''}
      </div>
    </div>
  `;

  document.getElementById('progressText').textContent = `第 ${current + 1} / ${total} 题`;
  document.getElementById('progressBar').style.width = `${((current + 1) / total) * 100}%`;

  const done = answers.filter(a => a !== undefined).length;
  const correct = answers.filter((a, i) => a === questions[i].correct).length;
  document.getElementById('scoreText').textContent = `正确 ${correct} / ${done}`;

  const btn = document.getElementById('nextBtn');
  btn.textContent = current === total - 1 ? '查看结果' : '下一题';
  btn.disabled = answers[current] === undefined;
}

function selectAnswer(idx) {
  answers[current] = idx;
  render();
}

function nextQuestion() {
  if (current < total - 1) {
    current++;
    render();
  } else {
    showResult();
  }
}

function showResult() {
  const correct = answers.filter((a, i) => a === questions[i].correct).length;
  const rate = correct / total;

  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressText').style.display = 'none';
  document.getElementById('scoreText').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('resultPanel').style.display = 'block';

  let emoji, title, desc;
  if (rate === 1) {
    emoji = '🏆'; title = '满分通过';
    desc = '教程和手册对你的效果很好。你已掌握报价全流程的四个价值层、客户分类、溢价判断、审批和谈判要点。建议你把经验反馈给团队，帮助优化教程。';
  } else if (rate >= 0.75) {
    emoji = '✅'; title = '通过';
    desc = `正确 ${correct}/${total}。你基本掌握了报价流程。建议回顾答错的题目对应的教程章节，特别是其中涉及的章程条款。`;
  } else if (rate >= 0.5) {
    emoji = '📖'; title = '需要复习';
    desc = `正确 ${correct}/${total}。几个关键环节还需要巩固：建议重读教程的对应章节，重点关注定价的四个价值层和审批流程。`;
  } else {
    emoji = '🔄'; title = '建议重学';
    desc = `正确 ${correct}/${total}。教程对你效果不够好——可能是教程表述不清晰，也可能是跳过了某些步骤。建议标注出让你困惑的地方，反馈给文档负责人优化教程。`;
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDesc').textContent = desc;
}

function resetQuiz() {
  current = 0;
  answers = [];
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('progressText').style.display = 'inline';
  document.getElementById('scoreText').style.display = 'inline';
  document.getElementById('resultPanel').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
